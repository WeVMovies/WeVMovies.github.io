<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>We♥Movies</title>
<style>
/* ═══════════════════════════════════════════════════
   RESET & ROOT
═══════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1923;--surface:#162231;--surface2:#1e3045;
  --accent:#00C9A7;--accent2:#7C4DFF;
  --text:#E8EDF2;--text2:#8ba3bc;--text3:#4a6580;
  --border:#1e3045;--radius:10px;--card-w:120px;
  --gold:#FFB300;--purple:#8E24AA;--blue:#1E88E5;--red:#E53935;
  --modal-bg:rgba(0,0,0,.7);
}
[data-theme="light"]{
  --bg:#F5F5F0;--surface:#FFFFFF;--surface2:#EEF0F5;
  --text:#1A1A2E;--text2:#4A4A6A;--text3:#9A9AB0;
  --border:#E0E0EC;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;overflow:hidden}
body{display:flex;flex-direction:column}
button{cursor:pointer;font-family:inherit;font-size:inherit;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;width:100%;outline:none;transition:border-color .2s}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
a{color:var(--accent);text-decoration:none}
img{display:block;max-width:100%}

/* ═══════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════ */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#screen{flex:1;overflow-y:auto;overflow-x:hidden}
#screen::-webkit-scrollbar{width:5px}
#screen::-webkit-scrollbar-track{background:transparent}
#screen::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── Bottom nav ── */
#bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0;color:var(--text2);transition:color .15s;position:relative;font-size:11px}
.nav-btn.active{color:var(--accent)}
.nav-btn__icon{font-size:22px;line-height:1}
.nav-btn__badge{position:absolute;top:6px;right:calc(50% - 20px);background:var(--accent);color:#000;border-radius:10px;font-size:9px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center}

/* ═══════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius);font-weight:600;transition:all .15s;white-space:nowrap;cursor:pointer}
.btn--primary{background:var(--accent);color:#000}
.btn--primary:hover{filter:brightness(1.1)}
.btn--ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn--ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn--success{background:#2e7d32;color:#fff}
.btn--success:hover{background:#388e3c}
.btn--danger{background:#c62828;color:#fff}
.btn--sm{padding:5px 10px;font-size:12px}
.btn--icon{width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--surface2)}
.btn--icon:hover{background:var(--accent);color:#000}

/* ═══════════════════════════════════════════════════
   CARDS
═══════════════════════════════════════════════════ */
.movie-card{width:var(--card-w);flex-shrink:0;cursor:pointer;transition:transform .16s}
.movie-card:hover{transform:scale(1.04);transform-origin:top center}
.movie-card__poster-wrap{position:relative;width:100%;padding-bottom:150%;border-radius:var(--radius);overflow:hidden;background:var(--surface2)}
.movie-card__poster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.movie-card__placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--text3)}
.movie-card__watched-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(27,94,32,.55),transparent);pointer-events:none}
.movie-card__watched-badge{position:absolute;top:6px;left:6px;background:#388e3c;border-radius:6px;padding:3px 5px;font-size:10px;font-weight:700;color:#fff}
.movie-card__watched-toggle--unseen{opacity:0;transition:opacity .15s}
.movie-card:hover .movie-card__watched-toggle--unseen{opacity:1}
.movie-card__watched-toggle{transition:background .15s,color .15s,opacity .15s}
.movie-card__watched-toggle:hover{filter:brightness(1.2) !important}
.movie-card__label-bar{display:none}/* replaced by label-strip */
/* bookmark removed - quick-add button sufficient */
.movie-card__date-badge{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.78);border-radius:6px;padding:2px 6px;font-size:9px;font-weight:700;color:#fff}
.movie-card__hover-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 40%);opacity:0;transition:opacity .2s;display:flex;align-items:flex-end;padding:8px}
.movie-card:hover .movie-card__hover-overlay{opacity:1}
.movie-card__trailer-hint{position:absolute;top:0;left:0;right:0;background:rgba(0,0,0,.78);text-align:center;padding:5px;font-size:11px;font-weight:600;color:#fff;opacity:0;transition:opacity .2s;pointer-events:none}
.movie-card__trailer-hint.visible{opacity:1;pointer-events:all}
.card--spotlight{z-index:20;position:relative}
.card--spotlight::after{content:'';position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:-1;pointer-events:none}
.mini-trailer-box{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);width:calc(var(--card-w)*3 + 24px);max-width:400px;min-width:220px;height:160px;background:#000;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.7);z-index:50;overflow:hidden}
.btn--quick-add{flex:1;padding:5px;font-size:11px;font-weight:600;border-radius:8px;background:rgba(0,201,167,.9);color:#000;text-align:center;transition:background .35s ease,color .35s ease}
.btn--quick-add.active{background:rgba(56,142,60,.9);color:#fff}
.btn--quick-add.active:hover{background:rgba(198,40,40,.88);color:#fff}
.movie-card__title{font-size:11px;font-weight:600;line-height:1.35;margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;height:30px}
.movie-card__meta{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2);margin-top:3px;min-height:16px}
.movie-card__year{color:var(--text3)}
.movie-card__rating{margin-left:auto;color:#FFB300;font-weight:600}
.movie-card__rating .soon{color:var(--accent)}
.movie-card__rating .no-rating{color:var(--text3)}
.personal-rating{margin-left:4px;color:#81d4fa;font-size:9px}
mark{background:rgba(0,201,167,.25);color:var(--accent);font-weight:700;border-radius:2px}

/* ═══════════════════════════════════════════════════
   CATEGORY ROW
═══════════════════════════════════════════════════ */
.category{margin-bottom:4px}
.category__header{display:flex;align-items:center;gap:8px;padding:20px 20px 10px}
.category__accent{width:3px;height:18px;border-radius:2px;flex-shrink:0}
.category__title{font-size:16px;font-weight:700;flex:1}
.category__collapse{background:none;border:none;color:var(--text3);font-size:14px;padding:4px}
.category__body{transition:max-height .3s}
.category__body.collapsed .category__scroll-wrap,.category__body.collapsed .category__dots{display:none}
.category__scroll-wrap{position:relative}
.category__row{display:flex;gap:10px;overflow-x:auto;overflow-y:hidden;padding:0 20px 6px;scrollbar-width:none}
.category__row::-webkit-scrollbar{display:none}
.category__arrow{position:absolute;top:72px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.7);border:1.5px solid rgba(255,255,255,.25);color:#fff;display:flex;align-items:center;justify-content:center;z-index:5;opacity:0;transition:opacity .2s,background .15s;cursor:pointer}
.category__arrow--left{left:8px}
.category__arrow--right{right:8px}
.category__arrow:hover{background:rgba(0,201,167,.35);border-color:var(--accent);color:var(--accent)}
.category__dots{display:flex;justify-content:center;gap:4px;padding:4px 0 8px}
.dot{height:4px;border-radius:2px;background:var(--border);transition:all .2s;width:6px}
.dot.active{width:16px;background:var(--accent)}

/* ═══════════════════════════════════════════════════
   GRID (search/favorites)
═══════════════════════════════════════════════════ */
.movie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:14px 12px;padding:16px}

/* ═══════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:var(--modal-bg);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;padding:16px}
.modal-overlay.show{opacity:1}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;transform:translateY(12px);transition:transform .2s}
.modal-overlay.show .modal{transform:translateY(0)}
.modal--wide{max-width:750px}
.modal--tall{max-height:95vh}
.modal-header{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-header h3{flex:1;font-size:16px;font-weight:700}
.modal-close{font-size:18px;color:var(--text2);padding:4px 8px;border-radius:6px}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{overflow-y:auto;flex:1}

/* ── Detail Modal ── */
.detail-hero{background:var(--surface2);background-size:cover;background-position:center;position:relative;min-height:180px}
.detail-hero__gradient{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(5,10,18,.55) 0%,rgba(5,10,18,.92) 100%),linear-gradient(to right,rgba(5,10,18,.98) 30%,rgba(5,10,18,.4))}
.detail-hero__content{position:relative;display:flex;gap:16px;padding:20px}
.detail-poster{width:90px;height:135px;object-fit:cover;border-radius:8px;flex-shrink:0;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.detail-info{flex:1;display:flex;flex-direction:column;gap:8px;justify-content:flex-end}
.detail-title{font-size:18px;font-weight:800;line-height:1.2;cursor:pointer;color:#fff}
.detail-title:hover{color:var(--accent)}
.detail-meta{display:flex;gap:10px;color:rgba(255,255,255,.7);font-size:13px;flex-wrap:wrap}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap}
.detail-actions .btn--ghost{border-color:rgba(255,255,255,.35);color:rgba(255,255,255,.9)}
.detail-actions .btn--ghost:hover{border-color:#00C9A7;color:#00C9A7}
.detail-actions .btn--primary{background:#00C9A7;color:#000}
.detail-actions .btn--success{background:#2e7d32;color:#fff}
.detail-body{padding:0 20px 20px}
.detail-section{padding-top:20px}
.detail-section h3{font-size:13px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.detail-overview{color:var(--text2);line-height:1.6;font-size:13px}
.detail-comment{min-height:70px}
.rating-buttons{display:flex;flex-wrap:wrap;gap:6px}
.rating-btn{width:34px;height:34px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);font-weight:700;font-size:13px;transition:all .15s;color:var(--text2)}
.rating-btn:hover,.rating-btn.active{background:var(--accent);border-color:var(--accent);color:#000}
.rating-btn--clear{width:auto;padding:0 10px;background:var(--surface2);border-color:var(--border);color:var(--red)}
.badge{background:var(--accent2);color:#fff;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}

/* gallery styles moved to action-btns-row block above */

/* ═══════════════════════════════════════════════════
   HOME SCREEN
═══════════════════════════════════════════════════ */
.home-header{display:flex;align-items:center;gap:10px;padding:18px 20px 0}
.home-logo{font-size:24px;font-weight:800;flex:1}
.home-logo span{color:var(--accent)}
.home-greeting{font-size:12px;color:var(--text3);padding:4px 20px 0}
.home-stats-chip{background:rgba(0,201,167,.12);color:var(--accent);border-radius:10px;padding:4px 10px;font-size:11px;font-weight:600}
.icon-btn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);font-size:18px;transition:background .15s}
.icon-btn:hover{background:rgba(0,201,167,.15)}

/* Mood picker */
.mood-section{padding:14px 20px 0}
.mood-label{font-size:12px;color:var(--text3);margin-bottom:8px}
.mood-chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.mood-chips::-webkit-scrollbar{display:none}
.mood-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;background:rgba(255,255,255,.06);font-size:12px;font-weight:600;color:var(--text2);transition:all .15s;cursor:pointer;border:1px solid transparent}
.mood-chip:hover,.mood-chip.active{background:var(--accent);color:#000;border-color:var(--accent)}

/* Daily movie */
.daily-card{margin:16px 20px 0;border-radius:14px;overflow:hidden;cursor:pointer;position:relative;min-height:110px;background:var(--surface2);transition:filter .2s}
.daily-card:hover{filter:brightness(1.08)}
.daily-card__bg{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;opacity:.45}
.daily-card__content{position:relative;display:flex;align-items:center;gap:14px;padding:14px 16px}
.daily-card__poster{width:50px;height:75px;object-fit:cover;border-radius:8px;flex-shrink:0}
.daily-card__label{font-size:11px;color:#FFB300;font-weight:700}
.daily-card__title{font-size:16px;font-weight:800}
.daily-card__sub{font-size:12px;color:var(--text2)}

/* Bored button */
.bored-btn{margin:12px 20px 0;border-radius:14px;padding:14px 16px;border:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.02)}
.bored-btn:hover{border-color:var(--accent);background:rgba(0,201,167,.08)}
.bored-btn__emoji{font-size:22px}
.bored-btn__text{flex:1}
.bored-btn__title{font-size:14px;font-weight:800}
.bored-btn__sub{font-size:12px;color:var(--text2)}
.bored-btn__arrow{color:var(--text3);font-size:14px}

/* ═══════════════════════════════════════════════════
   SEARCH SCREEN
═══════════════════════════════════════════════════ */
.search-header{padding:16px 16px 0;position:sticky;top:0;background:var(--bg);z-index:10}
.search-bar-row{display:flex;gap:8px;margin-bottom:8px}
.search-input-wrap{flex:1;min-width:80px;position:relative}
.search-input-wrap input{padding-left:38px;padding-right:32px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;display:none;cursor:pointer;background:none;border:none;padding:4px;line-height:1;z-index:2}
.search-clear.visible{display:block}
.search-clear:hover{color:var(--text)}
.filter-toggle{position:relative}
.filter-toggle.active{color:var(--accent)}
.filter-panel{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:10px;display:none}
.filter-panel.open{display:block}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.filter-label{font-size:12px;color:var(--text2);min-width:90px}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.filter-chip{padding:4px 10px;border-radius:14px;background:var(--surface2);font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s;color:var(--text2)}
.filter-chip.active{background:var(--accent);color:#000;border-color:var(--accent)}
.range-row{display:flex;gap:8px;align-items:center}
.range-row input[type="range"]{flex:1;accent-color:var(--accent);height:4px}
.range-val{font-size:12px;color:var(--accent);min-width:36px;text-align:right}
.sort-select{padding:6px 10px;border-radius:8px;font-size:12px;background:var(--surface2);border:1px solid var(--border)}

/* History */
.history-section{padding:0 16px 10px}
.history-label{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px;margin-bottom:8px}
.history-label button{font-size:11px;color:var(--accent);margin-left:auto}
.chip-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;background:rgba(255,255,255,.06);font-size:12px;cursor:pointer;border:1px solid transparent;transition:all .15s;color:var(--text2)}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip__star{font-size:11px;color:var(--text3)}
.chip__star.saved{color:#FFB300}

/* Genre keyboard */
.genre-keyboard{padding:12px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
.genre-btn{background:rgba(255,255,255,.04);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s;border:1px solid transparent;display:flex;flex-direction:column;align-items:center;gap:4px}
.genre-btn:hover{border-color:var(--accent);background:rgba(0,201,167,.1)}
.genre-btn__emoji{font-size:22px}
.genre-btn__name{font-size:11px;font-weight:600;color:var(--text2)}

/* Search bulk toolbar */
.bulk-toolbar{padding:8px 16px;display:flex;align-items:center;gap:10px;background:var(--surface);border-bottom:1px solid var(--border)}
.bulk-toolbar.hidden{display:none}

/* Empty / tip */
.tip-card{margin:12px 16px;padding:12px;background:rgba(0,201,167,.08);border:1px solid rgba(0,201,167,.2);border-radius:12px;display:flex;align-items:center;gap:12px;cursor:pointer}
.tip-card__poster{width:36px;height:54px;object-fit:cover;border-radius:6px;flex-shrink:0}
.empty-state{text-align:center;padding:48px 20px}
.empty-state__icon{font-size:56px;margin-bottom:14px}
.empty-state__title{font-size:16px;font-weight:700;margin-bottom:6px}
.empty-state__sub{color:var(--text2);margin-bottom:16px}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
.suggestion{padding:8px 16px;border-radius:20px;background:rgba(0,201,167,.12);color:var(--accent);font-weight:600;cursor:pointer}
.suggestion:hover{background:rgba(0,201,167,.25)}

/* ═══════════════════════════════════════════════════
   FAVORITES SCREEN
═══════════════════════════════════════════════════ */
.favs-header{padding:16px 16px 0;position:sticky;top:0;background:var(--bg);z-index:10}
.favs-toolbar{display:flex;align-items:center;gap:8px;padding:8px 16px;flex-wrap:wrap}
.progress-bar-wrap{padding:0 16px 8px}
.progress-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:var(--text2)}
.progress-bar{height:6px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.progress-bar__fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s}

/* Stats panel */
.stats-panel{margin:0 16px 10px;background:rgba(0,201,167,.06);border:1px solid rgba(0,201,167,.15);border-radius:14px;padding:14px;display:none}
.stats-panel.open{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat-item__val{font-size:20px;font-weight:800;color:var(--accent)}
.stat-item__label{font-size:10px;color:var(--text3)}

/* Collections */
.collections-row{padding:0 16px 8px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.collections-row::-webkit-scrollbar{display:none}
.col-chip{flex-shrink:0;padding:6px 12px;border-radius:20px;background:rgba(255,255,255,.06);font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s;color:var(--text2);display:flex;align-items:center;gap:5px}
.col-chip.active{background:var(--accent);color:#000;border-color:var(--accent)}
.col-chip__del{font-size:11px;opacity:.6;display:none}
.col-chip:hover .col-chip__del{display:inline}

/* Labels filter */
.labels-row{padding:0 16px 6px;display:flex;gap:6px;flex-wrap:wrap}
.label-filter{padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid transparent;transition:all .15s}

/* Card grid with context menu */
.movie-card-wrap{position:relative}
.card-menu-btn{position:absolute;bottom:46px;right:0;background:rgba(0,0,0,.65);border-radius:6px 0 0 0;padding:4px 6px;font-size:11px;color:rgba(255,255,255,.6);display:none;cursor:pointer;z-index:2}
.movie-card-wrap:hover .card-menu-btn{display:block}
.card-menu-btn:hover{color:#fff}
/* FIX #9: similar button replaces the ✨ card-menu-btn in search */
.similar-btn{position:absolute;bottom:46px;left:0;background:rgba(0,0,0,.65);border-radius:0 6px 0 0;padding:4px 7px;font-size:11px;color:rgba(255,255,255,.55);display:none;cursor:pointer;z-index:2}
.movie-card-wrap:hover .similar-btn{display:block}
.similar-btn:hover{color:#fff}

/* Context menu */

.ctx-menu-item{padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px}

/* Calendar view */
.calendar-view{padding:16px}
.cal-year{font-size:28px;font-weight:900;color:var(--accent);margin:12px 0 8px}
.cal-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:8px}
.cal-row::-webkit-scrollbar{display:none}

/* ═══════════════════════════════════════════════════
   BORED SCREEN
═══════════════════════════════════════════════════ */
.bored-screen{display:flex;flex-direction:column;height:100%;overflow:hidden}
.bored-topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}

.bored-filters{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:8px 10px;flex-shrink:0}

.bored-filter{flex-shrink:0;padding:5px 12px;border-radius:20px;background:rgba(255,255,255,.06);font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s;color:var(--text2)}
.bored-filter:hover,.bored-filter.active{background:var(--accent);color:#000}

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
.hon-screen{display:flex;flex-direction:column;height:100%;background:var(--bg)}

.hon-card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:16px}
.hon-card{width:100%;max-width:320px;border-radius:20px;overflow:hidden;position:relative;box-shadow:0 12px 40px rgba(0,0,0,.5);aspect-ratio:.67;background:var(--surface2);cursor:pointer;transition:transform .3s}
.hon-card.slide-right{transform:translateX(120%) rotate(15deg);opacity:0;transition:all .35s}

.hon-card__img{width:100%;height:100%;object-fit:cover;display:block}
.hon-card__overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 50%);pointer-events:none}
.hon-card__info{position:absolute;bottom:0;left:0;right:0;padding:16px}
.hon-card__title{font-size:20px;font-weight:900;color:#fff;line-height:1.2}

.hon-card__overview{font-size:12px;color:rgba(255,255,255,.5);margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hon-verdict{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px;opacity:0;pointer-events:none;transition:opacity .15s}
.hon-verdict.hot{background:rgba(0,200,100,.35)}
.hon-verdict.skip{background:rgba(255,50,50,.35)}

.hon-btns{display:flex;align-items:center;justify-content:center;gap:20px;padding:16px 16px 20px;flex-shrink:0}
.hon-btn{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.hon-btn__circle{border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:24px}
.hon-btn__circle:hover{transform:scale(1.12)}
.hon-btn--skip .hon-btn__circle{width:54px;height:54px;background:rgba(255,50,50,.15);color:#E53935}

.hon-btn--save .hon-btn__circle{width:54px;height:54px;background:var(--accent);color:#000}
.hon-btn__label{font-size:11px;color:var(--text3);font-weight:600}
.hon-done{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px;padding:24px}
.hon-done__emoji{font-size:64px}
.hon-done__title{font-size:24px;font-weight:900}
.hon-done__picks{display:flex;gap:8px;overflow-x:auto;max-width:100%;padding:8px 0}
.hon-done__picks img{width:80px;height:120px;object-fit:cover;border-radius:8px;flex-shrink:0}

   KINO VEČER
═══════════════════════════════════════════════════ */
.kv-screen{padding:20px}
.kv-intro{background:rgba(0,201,167,.07);border:1px solid rgba(0,201,167,.2);border-radius:16px;padding:16px;margin-bottom:16px}
.kv-theme{display:inline-flex;background:rgba(0,201,167,.15);color:var(--accent);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;margin-top:8px}

.kv-title{font-size:14px;font-weight:700;margin:2px 0}

.kv-actions{display:flex;gap:10px;margin-top:16px}

/* ═══════════════════════════════════════════════════
   SETUP SCREEN
═══════════════════════════════════════════════════ */
.setup-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}

/* ═══════════════════════════════════════════════════

.spinner-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;gap:14px;color:var(--text2)}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes mini-fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.wm-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;z-index:2000;opacity:0;transition:all .25s;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.4)}

.section-title{padding:20px 20px 10px;font-size:16px;font-weight:700}

</style>
