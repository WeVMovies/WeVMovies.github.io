<body data-theme="dark">

<div id="app">
  <div id="screen"><!-- content injected here --></div>
  <nav id="bottom-nav" class="hidden">
    <button class="nav-btn active" data-screen="home">
      <div class="nav-btn__icon">🏠</div>
      <div>Domů</div>
    </button>
    <button class="nav-btn" data-screen="search">
      <div class="nav-btn__icon">🔍</div>
      <div>Hledat</div>
    </button>
    <button class="nav-btn" data-screen="favorites">
      <div class="nav-btn__icon">❤️</div>
      <div>Oblíbené</div>
      <div class="nav-btn__badge hidden" id="fav-badge"></div>
    </button>

  </nav>
</div>

<script src="js/auth.js" type="module"></script>
<script src="js/api.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/bored.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════════
//  app.js — Router & screens
// ═══════════════════════════════════════════════════════════════════════════════

const App = {
  currentScreen: null,
  genreCache: [],
  _boredGrid: null,

  async init() {
    // Check auth — show login if not authenticated
    if (typeof Auth !== 'undefined') {
      Auth.init();
      if (!Auth.isLoggedIn) {
        renderAuthScreen(() => this.init());
        return;
      }
    }

    // Check token
    // Hardcoded TMDB Bearer token
    const HARDCODED_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI5MzdiYTNiOTY2OGM2NTMzZjFhNzU3MTEzYWQ4MWQwMyIsIm5iZiI6MTc3MzkwNjMzNS40ODE5OTk5LCJzdWIiOiI2OWJiYTk5ZmRkMGUwMDM2MTMwNTI2ZDMiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.yCoClpY_j6h_wmrkxoBzQ3v4FxgZ8JOmzwHwXXS1ryw';
    const token = HARDCODED_TOKEN || Storage.getToken();
    if (!token) { this.showSetup(); return; }
    API.setToken(token);
    Storage.setToken(token);

    // Theme
    this.applyTheme(Storage.getTheme());

    // Nav
    document.getElementById('bottom-nav').classList.remove('hidden');
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => this.navigate(btn.dataset.screen));
    });

    // Add user menu to nav
    this._addUserMenu();

    // Favorites badge
    document.addEventListener('favorites-changed', () => this.updateBadge());
    this.updateBadge();

    // Load genres
    this.genreCache = await API.getGenres().catch(() => []);

    this.navigate('home');
  },

  _addUserMenu() {
    if (typeof Auth === 'undefined' || !Auth.isLoggedIn) return;
    const nav = document.getElementById('bottom-nav');
    if (!nav || nav.querySelector('#user-nav-btn')) return;
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.id = 'user-nav-btn';
    btn.innerHTML = `<div class="nav-btn__icon">👤</div><div>${Auth.currentUser.username}</div>`;
    btn.addEventListener('click', () => {
      if (confirm(`Odhlásit se jako ${Auth.currentUser.username}?`)) Auth.logout();
    });
    nav.appendChild(btn);
  },

  applyTheme(theme) {
    document.body.dataset.theme = theme;
    Storage.setTheme(theme);
  },

  toggleTheme() {
    const current = Storage.getTheme();
    this.applyTheme(current === 'dark' ? 'light' : 'dark');
  },

  navigate(screen) {
    // Kill any active mini trailer preview
    if (typeof hideMiniTrailer === 'function') {
      document.querySelectorAll('.movie-card').forEach(card => {
        card._hoverActive = false;
        clearTimeout(card._miniTimer);
      });
      if (typeof _miniBox !== 'undefined' && _miniBox) {
        clearInterval(_miniBox._slideInterval);
        _miniBox.remove();
        window._miniBox = null;
      }
      const bd = document.getElementById('_mini-bd');
      if (bd) bd.remove();
      window._miniPlayerActive = null;
    }
    // Destroy bored grid if leaving
    if (this._boredGrid && screen !== 'bored') {
      this._boredGrid.destroy();
      this._boredGrid = null;
    }
    this.currentScreen = screen;
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.screen === screen);
    });
    const s = document.getElementById('screen');
    // Reset overflow in case bored/hotnot set it
    s.style.overflow = '';
    s.style.height = '';
    s.scrollTo(0, 0);
    switch(screen) {
      case 'home':      this.renderHome(); break;
      case 'search':    this.renderSearch(); break;
      case 'favorites': this.renderFavorites(); break;
      case 'hotnot':    this.renderHotOrNotLanding(); break;
    }
  },

  updateBadge() {
    const favs = Storage.getFavorites();
    const watched = Storage.getWatchedIds();
    const unwatched = favs.filter(m => !watched.has(m.imdbId)).length;
    const badge = document.getElementById('fav-badge');
    if (badge) {
      badge.textContent = unwatched;
      badge.classList.toggle('hidden', unwatched === 0);
    }
  },

  // ════════════════════════════════════════════════
  //  SETUP
  // ════════════════════════════════════════════════
  showSetup() {
    document.getElementById('screen').innerHTML = `
    <div class="setup-screen">
      <div class="setup-card">
        <div class="setup-logo">We<span>♥</span>Movies</div>
        <div class="setup-sub">Tvůj osobní filmový watchlist. Pro start potřebuješ API klíč z TMDB.</div>
        <ul class="setup-steps">
          <li>Jdi na <a href="https://www.themoviedb.org" target="_blank">themoviedb.org</a></li>
          <li>Zaregistruj se (zdarma)</li>
          <li>Nastav → API → vytvoř klíč</li>
          <li>Zkopíruj <strong>Bearer Token (API Read Access)</strong></li>
        </ul>
        <div class="setup-input-row">
          <input id="token-input" type="password" class="input" placeholder="Bearer token...">
          <button class="btn btn--primary" id="token-save">Spustit</button>
        </div>
        <p id="token-err" style="color:#E53935;font-size:12px;margin-top:8px;display:none">Neplatný token. Zkus znovu.</p>
      </div>
    </div>`;
    document.getElementById('token-save').addEventListener('click', async () => {
      const val = document.getElementById('token-input').value.trim();
      if (!val) return;
      API.setToken(val);
      try {
        await API.getGenres();
        Storage.setToken(val);
        this.init();
      } catch {
        document.getElementById('token-err').style.display = '';
      }
    });
  },

  // ════════════════════════════════════════════════
  //  HOME
  // ════════════════════════════════════════════════
  async renderHome() {
    const s = document.getElementById('screen');
    const theme = Storage.getTheme();
    const hour = new Date().getHours();
    const greeting = hour < 6 ? 'Noční sova 🦉' : hour < 12 ? 'Dobré ráno ☀️' : hour < 18 ? 'Dobré odpoledne 🎬' : 'Dobrý večer 🌙';
    const stats = Storage.getStats();
    const collapsed = Storage.getCollapsed();

    s.innerHTML = `
      <div class="home-greeting">${greeting}</div>
      <div class="home-header">
        <div class="home-logo">We<span>♥</span>Movies</div>
        ${stats.total > 0 ? `<span class="home-stats-chip">${stats.watched}/${stats.total} viděno</span>` : ''}
        <button class="icon-btn" id="btn-random" title="Náhodný film">🎲</button>
        <button class="icon-btn" id="btn-sync" title="Synchronizace zařízení">🔄</button>
        <button class="icon-btn" id="btn-theme" title="Přepnout téma">${theme === 'dark' ? '☀️' : '🌙'}</button>
      </div>
      <div class="mood-section">
        <div class="mood-label">Na co máš náladu?</div>
        <div class="mood-chips" id="mood-chips">
          <div class="mood-chip active" data-genre="">✨ Vše</div>
          ${this.genreCache.slice(0, 10).map(g =>
            `<div class="mood-chip" data-genre="${g.id}">${GENRE_EMOJIS[g.id] || '🎬'} ${g.name}</div>`
          ).join('')}
        </div>
      </div>
      <div class="action-btns-row">
        <div class="bored-btn" id="btn-bored">
          <div class="bored-btn__emoji">😴</div>
          <div class="bored-btn__text">
            <div class="bored-btn__title">Bored?</div>
            <div class="bored-btn__sub">Stovky filmů k objevení</div>
          </div>
          <div class="bored-btn__arrow">›</div>
        </div>
        <div class="bored-btn hotnot-btn" id="btn-hotnot-home">
          <div class="bored-btn__emoji">🔥</div>
          <div class="bored-btn__text">
            <div class="bored-btn__title">Hot or Not</div>
            <div class="bored-btn__sub">Rychle vybírej filmy</div>
          </div>
          <div class="bored-btn__arrow">›</div>
        </div>
      </div>
      <div id="daily-slot"></div>
      <div id="main-cats">
        ${spinner('Načítám filmy...')}
      </div>
    `;

    // Buttons
    document.getElementById('btn-random').addEventListener('click', async () => {
      // Pick truly random from popular catalog
      const page = Math.floor(Math.random() * 15) + 1;
      try {
        const data = await fetch(`https://api.themoviedb.org/3/movie/popular?language=cs-CZ&page=${page}`,
          { headers: { 'Authorization': 'Bearer ' + API.getToken() }}).then(r => r.json());
        const results = (data.results || []).filter(m => m.poster_path);
        if (results.length) {
          const raw = results[Math.floor(Math.random() * results.length)];
          const movie = {
            id: raw.id, title: raw.title || raw.name || '?',
            year: (raw.release_date || '').substring(0,4),
            imdbId: String(raw.id),
            posterUrl: raw.poster_path ? `https://image.tmdb.org/t/p/w342${raw.poster_path}` : '',
            backdropUrl: raw.backdrop_path ? `https://image.tmdb.org/t/p/w780${raw.backdrop_path}` : '',
            rating: (raw.vote_count || 0) >= 10 ? (raw.vote_average || 0) : 0,
            overview: raw.overview || '', genreIds: raw.genre_ids || [],
            releaseDate: raw.release_date || '', mediaType: 'movie',
          };
          openMovieDetail(movie);
        }
      } catch { showToast('Chyba při načítání náhodného filmu'); }
    });
    document.getElementById('btn-theme').addEventListener('click', () => {
      this.toggleTheme();
      document.getElementById('btn-theme').textContent = Storage.getTheme() === 'dark' ? '☀️' : '🌙';
    });
    document.getElementById('btn-sync').addEventListener('click', () => showSyncModal());
    document.getElementById('btn-bored').addEventListener('click', () => this.renderBored());
    document.getElementById('btn-hotnot-home').addEventListener('click', () => this.navigate('hotnot'));

    // Mood chips
    document.getElementById('mood-chips').addEventListener('click', async e => {
      const chip = e.target.closest('.mood-chip');
      if (!chip) return;
      const genreId = chip.dataset.genre;
      const alreadyActive = chip.classList.contains('active');

      document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('active'));

      // FIX #13: clicking active genre deselects it → show all
      if (alreadyActive && genreId) {
        document.querySelector('.mood-chip[data-genre=""]').classList.add('active');
        this._loadMainCategories();
        return;
      }

      chip.classList.add('active');
      if (!genreId) {
        this._loadMainCategories();
      } else {
        const main = document.getElementById('main-cats');
        main.innerHTML = spinner('Načítám žánr...');
        const movies = await API.getByGenre(parseInt(genreId), 2).catch(() => []);
        const g = this.genreCache.find(g => g.id === parseInt(genreId));
        main.innerHTML = buildCategoryRow('mood', `${GENRE_EMOJIS[parseInt(genreId)] || '🎬'} ${g?.name || ''}`, movies, { accentColor: 'var(--accent)' });
        attachCategoryEvents('main-cats');
      }
    });

    // Daily
    API.getDailyMovie().then(movie => {
      if (!movie) return;
      document.getElementById('daily-slot').innerHTML = `
        <div class="daily-card" id="daily-card">
          ${movie.backdropUrl ? `<img class="daily-card__bg" src="${movie.backdropUrl}" alt="">` : ''}
          <div class="daily-card__content">
            ${movie.posterUrl ? `<img class="daily-card__poster" src="${movie.posterUrl}" alt="">` : ''}
            <div>
              <div class="daily-card__label">🌟 Film dne</div>
              <div class="daily-card__title">${escHtml(movie.title)}</div>
              <div class="daily-card__sub">${movie.year}${movie.rating > 0 ? ` · ★ ${movie.rating.toFixed(1)}` : ''}</div>
            </div>
          </div>
        </div>`;
      document.getElementById('daily-card').addEventListener('click', () => openMovieDetail(movie));
    }).catch(() => {});



    this._loadMainCategories();
  },

  async _loadMainCategories() {
    const main = document.getElementById('main-cats');
    if (!main) return;
    main.innerHTML = spinner('Načítám filmy...');
    try {
      const [popular, nowPlaying, topRated, upcoming] = await Promise.all([
        API.getPopular(), API.getNowPlaying(), API.getTopRated(), API.getUpcoming()
      ]);
      const upcomingDedup = API.deduplicateAgainst(upcoming, nowPlaying);
      main.innerHTML =
        buildCategoryRow('popular',    '🔥 Populární',       popular,       { accentColor: '#FFB300', collapsible: true }) +
        buildCategoryRow('nowplaying', '🎬 Právě v kinech',  nowPlaying,    { accentColor: '#00C9A7', collapsible: true }) +
        buildCategoryRow('toprated',  '⭐ Top hodnocené',    topRated,      { accentColor: '#8E24AA', collapsible: true }) +
        buildCategoryRow('upcoming',  '🗓 Nadcházející',     upcomingDedup, { accentColor: '#1E88E5', collapsible: true });
      attachCategoryEvents('main-cats');
    } catch(e) {
      main.innerHTML = `<div class="empty-state"><div class="empty-state__icon">⚠️</div><div class="empty-state__title">Chyba načítání</div></div>`;
    }
  },

  // ════════════════════════════════════════════════
  //  SEARCH
  // ════════════════════════════════════════════════
  _searchState: { query: '', filters: {}, sortBy: 'relevance', bulkMode: false, bulkSelected: new Set(), loading: false },

  renderSearch() {
    const s = document.getElementById('screen');
    const st = this._searchState;
    const history = Storage.getHistory();
    const savedSearches = Storage.getSavedSearches();

    s.innerHTML = `
      <div class="search-header">
        <div class="search-bar-row">
          <div class="search-input-wrap">
            <span class="search-icon">🔍</span>
            <input id="search-input" type="text" placeholder="Název..." value="${escHtml(st.query)}">
            <button class="search-clear ${st.query ? 'visible' : ''}" id="search-clear">✕</button>
          </div>
          ${(() => {
            const s = st.sortBy;
            const ratingDir = s === 'rating_desc' ? 'desc' : s === 'rating_asc' ? 'asc' : null;
            const yearDir   = s === 'year_desc'   ? 'desc' : s === 'year_asc'   ? 'asc' : null;
            const titleDir  = s === 'title_az'    ? 'asc'  : s === 'title_za'   ? 'desc': null;
            return `<button class="sort-inline-btn ${ratingDir?'active':''}" data-sort-group="rating" title="Seřadit dle hodnocení">★${ratingDir?(' '+(ratingDir==='asc'?'↑':'↓')):''}
            </button><button class="sort-inline-btn ${yearDir?'active':''}" data-sort-group="year" title="Seřadit dle roku">📅${yearDir?(' '+(yearDir==='asc'?'↑':'↓')):''}
            </button><button class="sort-inline-btn ${titleDir?'active':''}" data-sort-group="title" title="Seřadit dle názvu">A${titleDir?(' '+(titleDir==='desc'?'↓':'↑')):''}
            </button>`;
          })()}
          <button class="btn btn--ghost btn--sm" id="filter-toggle">${st.showFilters ? "▲" : "▼"} Filtry</button>
        </div>
        <div class="filter-panel ${st.showFilters ? 'open' : ''}" id="filter-panel">
          <div class="filter-row">
            <div class="filter-label">Typ:</div>
            <div class="filter-chips">
              <div class="filter-chip ${!st.filters.searchTV ? 'active' : ''}" data-type="movie">🎬 Film</div>
              <div class="filter-chip ${st.filters.searchTV ? 'active' : ''}" data-type="tv">📺 Seriál</div>
            </div>
            <select class="sort-select" id="sort-select" style="margin-left:auto">
              <option value="relevance" ${st.sortBy==='relevance'?'selected':''}>Relevance</option>
              <option value="rating"    ${st.sortBy==='rating'   ?'selected':''}>Hodnocení</option>
              <option value="year_desc" ${st.sortBy==='year_desc'?'selected':''}>Nejnovější</option>
              <option value="year_asc"  ${st.sortBy==='year_asc' ?'selected':''}>Nejstarší</option>
            </select>
          </div>
          <div class="filter-row">
            <div class="filter-label">Rok od:</div>
            <div class="range-row" style="flex:1">
              <input type="range" id="year-from" min="1950" max="${new Date().getFullYear()}" value="${st.filters.yearFrom || 1950}">
              <div class="range-val" id="year-from-val">${st.filters.yearFrom || 'Vše'}</div>
            </div>
            <div class="filter-label" style="margin-left:12px">do:</div>
            <div class="range-row" style="flex:1">
              <input type="range" id="year-to" min="1950" max="${new Date().getFullYear()}" value="${st.filters.yearTo || new Date().getFullYear()}">
              <div class="range-val" id="year-to-val">${st.filters.yearTo || 'Vše'}</div>
            </div>
          </div>
          <div class="filter-row">
            <div class="filter-label">Min. ★:</div>
            <div class="range-row" style="flex:1">
              <input type="range" id="min-rating" min="0" max="9" step="0.5" value="${st.filters.minRating || 0}">
              <div class="range-val" id="min-rating-val">${st.filters.minRating || 'Vše'}</div>
            </div>
            <button class="btn btn--sm btn--ghost" id="reset-filters" style="margin-left:12px">Reset</button>
          </div>
          <div class="filter-row">
            <div class="filter-label">Max. filmů:</div>
            <div class="range-row" style="flex:1">
              <input type="range" id="max-results" min="3" max="250" step="1" value="${st.maxPages || 10}">
              <div class="range-val" id="max-results-val">${(st.maxPages || 10) * 20}</div>
            </div>
          </div>
          <div class="filter-chips" id="genre-filter-chips">
            <div class="filter-chip ${!st.filters.genreId ? 'active' : ''}" data-genre="">Vše</div>
            ${this.genreCache.map(g =>
              `<div class="filter-chip ${st.filters.genreId===g.id?'active':''}" data-genre="${g.id}">${GENRE_EMOJIS[g.id]||'🎬'} ${g.name}</div>`
            ).join('')}
          </div>
        </div>
      </div>

      <div id="search-results">
        ${this._buildSearchEmpty(history, savedSearches)}
      </div>`;

    this._attachSearchEvents();
    if (st.query) this._doSearch(st.query);
    else if (st.filters.genreId || st.filters.yearFrom || st.filters.yearTo || st.filters.minRating) {
      // Auto-search if filters are set but no query
      this._doSearch('');
    }
  },

  _buildSearchEmpty(history, savedSearches) {
    const tip = ''; // will be loaded async
    const genres = this.genreCache;
    return `
      ${savedSearches.length ? `
        <div class="history-section">
          <div class="history-label">⭐ Uložená hledání</div>
          <div class="chip-row">${savedSearches.map(q => this._chipHtml(q, true)).join('')}</div>
        </div>` : ''}
      ${history.length ? `
        <div class="history-section" style="margin-top:${savedSearches.length?8:0}px">
          <div class="history-label">🕐 Nedávné
            <button id="clear-history">Smazat</button>
          </div>
          <div class="chip-row">${history.map(q => this._chipHtml(q, savedSearches.includes(q))).join('')}</div>
        </div>` : ''}
`;
  },

  _chipHtml(q, isSaved) {
    return `<div class="chip" data-query="${escHtml(q)}">
      🕐 ${escHtml(q)}
      <span class="chip__star ${isSaved ? 'saved' : ''}" data-star="${escHtml(q)}">${isSaved ? '★' : '☆'}</span>
    </div>`;
  },

  _attachSearchEvents() {
    const inp = document.getElementById('search-input');
    const clr = document.getElementById('search-clear');
    const res = document.getElementById('search-results');
    let debounce;

    inp?.addEventListener('input', () => {
      const q = inp.value;
      clr?.classList.toggle('visible', !!q);
      this._searchState.query = q;
      clearTimeout(debounce);
      debounce = setTimeout(() => { if (q.trim()) this._doSearch(q); else this.renderSearch(); }, 450);
    });
    inp?.addEventListener('keydown', e => { if (e.key === 'Enter') { clearTimeout(debounce); this._doSearch(inp.value); } });
    clr?.addEventListener('click', () => { inp.value = ''; this._searchState.query = ''; clr.classList.remove('visible'); this.renderSearch(); });

    document.getElementById('filter-toggle')?.addEventListener('click', () => {
      this._searchState.showFilters = !this._searchState.showFilters;
      document.getElementById('filter-panel')?.classList.toggle('open', this._searchState.showFilters);
      const btn = document.getElementById('filter-toggle');
      if (btn) btn.textContent = this._searchState.showFilters ? '▲ Filtry' : '▼ Filtry';
    });

    // Sort inline toggle buttons — click once = activate that sort desc, click again = flip direction
    document.querySelectorAll('.sort-inline-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const group = btn.dataset.sortGroup;
        const cur = this._searchState.sortBy;
        let next;
        if (group === 'rating') next = cur === 'rating_desc' ? 'rating_asc' : 'rating_desc';
        else if (group === 'year')  next = cur === 'year_desc'   ? 'year_asc'   : 'year_desc';
        else if (group === 'title') next = cur === 'title_az'    ? 'title_za'   : 'title_az';
        this._searchState.sortBy = next;
        // Update active state of all sort buttons
        document.querySelectorAll('.sort-inline-btn').forEach(b => {
          const g = b.dataset.sortGroup;
          const s = this._searchState.sortBy;
          const active = (g === 'rating' && (s === 'rating_desc' || s === 'rating_asc'))
                      || (g === 'year'   && (s === 'year_desc'   || s === 'year_asc'))
                      || (g === 'title'  && (s === 'title_az'    || s === 'title_za'));
          b.classList.toggle('active', active);
          if (g === 'rating') b.textContent = `★ ${s === 'rating_asc' ? '↑' : '↓'}`;
          if (g === 'year')   b.textContent = `📅 ${s === 'year_asc' ? '↑' : '↓'}`;
          if (g === 'title')  b.textContent = `A ${s === 'title_za' ? '↓' : '↑'}`;
        });
        this._doSearch(this._searchState.query || '');
      });
    });

    // Filters
    const setFilter = (key, val) => { this._searchState.filters[key] = val; this._doSearch(this._searchState.query || ''); };

    document.querySelectorAll('[data-type]').forEach(el => el.addEventListener('click', () => {
      document.querySelectorAll('[data-type]').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      setFilter('searchTV', el.dataset.type === 'tv');
    }));

    document.getElementById('sort-select')?.addEventListener('change', e => { this._searchState.sortBy = e.target.value; if (this._searchState.query || Object.values(this._searchState.filters).some(Boolean)) this._doSearch(this._searchState.query || ''); });

    const setupRange = (id, valId, key, fmt) => {
      const el = document.getElementById(id);
      const vl = document.getElementById(valId);
      el?.addEventListener('input', () => { const v = parseFloat(el.value); vl.textContent = fmt ? fmt(v) : v; setFilter(key, v > 0 ? v : null); });
    };
    setupRange('year-from', 'year-from-val', 'yearFrom', v => v > 1950 ? v : 'Vše');
    setupRange('year-to', 'year-to-val', 'yearTo', v => v < new Date().getFullYear() ? v : 'Vše');
    setupRange('min-rating', 'min-rating-val', 'minRating', v => v > 0 ? v.toFixed(1) : 'Vše');
    const maxEl = document.getElementById('max-results');
    const maxVl = document.getElementById('max-results-val');
    maxEl?.addEventListener('input', () => {
      const v = parseInt(maxEl.value);
      maxVl.textContent = v * 20;
      this._searchState.maxPages = v;
      // Don't auto-search on drag — only when user releases
    });
    maxEl?.addEventListener('change', () => {
      if (this._searchState.query || Object.values(this._searchState.filters).some(Boolean))
        this._doSearch(this._searchState.query || '');
    });

    document.getElementById('reset-filters')?.addEventListener('click', () => {
      this._searchState.filters = {};
      this._searchState.query = '';
      this.renderSearch();
    });

    document.getElementById('genre-filter-chips')?.addEventListener('click', e => {
      const chip = e.target.closest('[data-genre]');
      if (!chip) return;
      // Always store as int or null — never as string
      const raw = chip.dataset.genre;
      const clickedId = raw ? parseInt(raw) : null;
      const current = this._searchState.filters.genreId;
      // Toggle: clicking active genre clears it
      const newId = (current === clickedId && clickedId !== null) ? null : clickedId;
      this._searchState.filters.genreId = newId;
      // Update active chips
      document.querySelectorAll('#genre-filter-chips [data-genre]').forEach(c => c.classList.remove('active'));
      const selector = newId === null ? '[data-genre=""]' : '[data-genre="' + newId + '"]';
      document.querySelector('#genre-filter-chips ' + selector)?.classList.add('active');
      // Always trigger search (even with no query — discover mode works fine with empty query)
      this._doSearch(this._searchState.query || '');
    });



    // History + chips
    res?.addEventListener('click', e => {
      const chip = e.target.closest('.chip');
      const star = e.target.closest('[data-star]');
      const clrH = e.target.closest('#clear-history');
      const sug = e.target.closest('.suggestion');

      if (star) { e.stopPropagation(); Storage.toggleSavedSearch(star.dataset.star); this.renderSearch(); return; }
      if (chip) { const q = chip.dataset.query; inp.value = q; this._searchState.query = q; this._doSearch(q); return; }

      if (clrH) { Storage.clearHistory(); this.renderSearch(); return; }
      if (sug) { inp.value = sug.textContent; this._searchState.query = sug.textContent; this._doSearch(sug.textContent); return; }
    });


  },

  _sortMovies(movies, sortBy) {
    const m = [...movies];
    if (sortBy === 'rating_desc') m.sort((a,b) => b.rating - a.rating);
    else if (sortBy === 'rating_asc')  m.sort((a,b) => a.rating - b.rating);
    else if (sortBy === 'year_desc')   m.sort((a,b) => (b.year||'').localeCompare(a.year||''));
    else if (sortBy === 'year_asc')    m.sort((a,b) => (a.year||'').localeCompare(b.year||''));
    else if (sortBy === 'title_az')    m.sort((a,b) => a.title.localeCompare(b.title, 'cs'));
    else if (sortBy === 'title_za')    m.sort((a,b) => b.title.localeCompare(a.title, 'cs'));
    return m;
  },

  async _doSearch(query) {
    const st = this._searchState;
    const res = document.getElementById('search-results');
    if (!res || st.loading) return;
    st.loading = true;
    res.innerHTML = spinner('Hledám...');
    try {
      if (query.trim()) Storage.addToHistory(query.trim());

      const PAGES = st.maxPages || 10;
      const pageNums = Array.from({ length: PAGES }, (_, i) => i + 1);
      const results = await Promise.allSettled(pageNums.map(p =>
        API.searchMovies(query, {
          yearFrom: st.filters.yearFrom, yearTo: st.filters.yearTo,
          genreId: st.filters.genreId, minRating: st.filters.minRating,
          searchTV: st.filters.searchTV, page: p,
        })
      ));
      const seen = new Set();
      let movies = [];
      for (const r of results) {
        if (r.status !== 'fulfilled') continue;
        for (const m of r.value) {
          if (!seen.has(m.imdbId)) { seen.add(m.imdbId); movies.push(m); }
        }
      }
      movies = this._sortMovies(movies, st.sortBy);

      if (!movies.length) {
        res.innerHTML = `
          <div class="empty-state">
            <div class="empty-state__icon">🔍</div>
            <div class="empty-state__title">Žádné výsledky pro "${escHtml(query)}"</div>
            <div class="empty-state__sub">Zkus toto:</div>
            <div class="suggestions">
              ${['Batman','Marvel','Disney','Horror','Action','Comedy'].map(s => `<div class="suggestion">${s}</div>`).join('')}
            </div>
          </div>`;
        return;
      }

      const isBulk = st.bulkMode;
      const selected = st.bulkSelected;

      res.innerHTML = `
        <div style="padding:8px 16px 4px;font-size:12px;color:var(--text3)">${movies.length} výsledků</div>
        <div class="bulk-toolbar ${isBulk ? '' : 'hidden'}" id="bulk-toolbar">
          <span style="color:var(--text2);font-size:13px">Vybráno: <strong id="bulk-count">0</strong></span>
          <button class="btn btn--primary btn--sm" id="bulk-add-btn">+ Přidat vybrané</button>
          <button class="btn btn--ghost btn--sm" id="bulk-cancel">Zrušit</button>
        </div>
        <div class="movie-grid" id="search-grid">
          ${movies.map(m => `
            <div class="movie-card-wrap" data-id="${m.imdbId}">
              ${movieCard(m, { highlight: query })}
              ${isBulk ? `<div class="bulk-check ${selected.has(m.imdbId)?'active':''}" style="position:absolute;top:6px;left:6px;width:20px;height:20px;border-radius:50%;background:${selected.has(m.imdbId)?'var(--accent)':'rgba(0,0,0,.5)'};border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:11px">${selected.has(m.imdbId)?'✓':''}</div>` : ''}
            </div>`).join('')}
        </div>`;

      attachCardEvents(res);

      if (isBulk) {
        const updateBulkCount = () => { document.getElementById('bulk-count').textContent = selected.size; };
        document.getElementById('search-grid')?.addEventListener('click', e => {
          const wrap = e.target.closest('.movie-card-wrap');
          if (!wrap) return;
          const id = wrap.dataset.id;
          if (selected.has(id)) selected.delete(id); else selected.add(id);
          const chk = wrap.querySelector('.bulk-check');
          if (chk) { chk.style.background = selected.has(id) ? 'var(--accent)' : 'rgba(0,0,0,.5)'; chk.textContent = selected.has(id) ? '✓' : ''; }
          updateBulkCount();
        });
        document.getElementById('bulk-add-btn')?.addEventListener('click', async () => {
          for (const id of selected) {
            const m = movies.find(x => x.imdbId === id);
            if (m) Storage.saveFavorite(m);
          }
          document.dispatchEvent(new CustomEvent('favorites-changed'));
          showToast(`🔖 ${selected.size} filmů přidáno`);
          selected.clear();
          updateBulkCount();
        });
        document.getElementById('bulk-cancel')?.addEventListener('click', () => {
          st.bulkMode = false; selected.clear(); this._doSearch(query);
        });
      }
    } catch(e) {
      console.error('Search error', e);
      if (res) res.innerHTML = `<div class="empty-state"><div class="empty-state__icon">⚠️</div><div class="empty-state__title">Chyba při hledání</div></div>`;
    } finally {
      st.loading = false;
    }
  },

  // ════════════════════════════════════════════════
  //  FAVORITES
  // ════════════════════════════════════════════════
  _favState: { sortBy: 'added', filterLabel: null, filterCollection: null, calendarView: false, showStats: false },

  renderFavorites() {
    const s = document.getElementById('screen');
    const st = this._favState;
    const favs = Storage.getFavorites();
    const watchedIds = Storage.getWatchedIds();
    const stats = Storage.getStats();
    const progress = stats.total > 0 ? stats.watched / stats.total : 0;
    const collections = Storage.getCollections();
    const labels = Storage.getLabels();
    const ratings = Storage.getAllRatings();
    const genres = this.genreCache;

    // Filter + sort
    let filtered = [...favs];
    if (st.filterCollection) {
      const col = collections.find(c => c.id === st.filterCollection);
      if (col) filtered = filtered.filter(m => col.movieIds.includes(m.imdbId));
    }
    if (st.filterLabel) filtered = filtered.filter(m => labels[m.imdbId] === st.filterLabel);
    if (st.sortBy === 'title')   filtered.sort((a,b) => a.title.localeCompare(b.title));
    if (st.sortBy === 'rating')  filtered.sort((a,b) => (ratings[b.imdbId]||0) - (ratings[a.imdbId]||0));
    if (st.sortBy === 'year')    filtered.sort((a,b) => b.year.localeCompare(a.year));
    if (st.sortBy === 'watched') filtered.sort((a,b) => (watchedIds.has(a.imdbId)?1:0) - (watchedIds.has(b.imdbId)?1:0));

    const topGenre = stats.topGenreId ? genres.find(g => g.id === stats.topGenreId)?.name || '?' : '?';

    s.innerHTML = `
      <div class="favs-header">
        <div style="display:flex;align-items:center;gap:8px;padding:12px 16px 8px">
          <h2 style="flex:1;font-size:16px;font-weight:800">❤️ Moje oblíbené</h2>
          <button class="btn btn--icon" id="btn-random-unseen" title="Náhodný neshlédnutý">🎲</button>
          <button class="btn btn--icon" id="btn-calendar" title="Kalendář">${st.calendarView?'🔲':'📅'}</button>
          <button class="btn btn--icon" id="btn-stats" title="Statistiky">📊</button>
          <button class="btn btn--icon" id="btn-share" title="Sdílet">🔗</button>
          <button class="btn btn--icon" id="btn-new-col" title="Nová kolekce">📁+</button>
          <button class="btn btn--icon" id="btn-new-label" title="Nový štítek">🏷️+</button>
        </div>
        ${stats.total > 0 ? `
          <div class="progress-bar-wrap">
            <div class="progress-bar-label">
              <span>${stats.watched} / ${stats.total} viděno</span>
              <span style="color:var(--accent);font-weight:700">${Math.round(progress*100)}%</span>
            </div>
            <div class="progress-bar"><div class="progress-bar__fill" style="width:${progress*100}%"></div></div>
          </div>` : ''}
        <div class="favs-toolbar">
          <select class="sort-select" id="fav-sort">
            <option value="added"   ${st.sortBy==='added'  ?'selected':''}>Datum přidání</option>
            <option value="title"   ${st.sortBy==='title'  ?'selected':''}>Název A-Z</option>
            <option value="rating"  ${st.sortBy==='rating' ?'selected':''}>Moje hodnocení</option>
            <option value="year"    ${st.sortBy==='year'   ?'selected':''}>Rok</option>
            <option value="watched" ${st.sortBy==='watched'?'selected':''}>Neshlédnuté první</option>
          </select>
          <span style="margin-left:auto;color:var(--accent);font-size:12px;font-weight:600">${movieCountLabel(filtered.length)}</span>
        </div>
      </div>

      <!-- Stats panel -->
      <div class="stats-panel ${st.showStats?'open':''}" id="stats-panel">
        <div class="stats-grid">
          ${[['Celkem',stats.total],['Viděno',stats.watched],['Zbývá',stats.notWatched],
             ['Ø hodnocení',stats.avgRating>0?stats.avgRating.toFixed(1):'-'],
             ['Ø rok',stats.avgYear||'-'],['Top žánr',topGenre]
            ].map(([l,v]) => `<div class="stat-item"><div class="stat-item__val">${v}</div><div class="stat-item__label">${l}</div></div>`).join('')}
        </div>
      </div>

      <!-- Collections -->
      ${collections.length ? `
        <div class="collections-row">
          <div class="col-chip ${!st.filterCollection?'active':''}" data-col="">📚 Vše</div>
          ${collections.map(c => `
            <div class="col-chip ${st.filterCollection===c.id?'active':''}" data-col="${c.id}">
              ${escHtml(c.name)}
              <span class="col-chip__del" data-del="${c.id}">✕</span>
            </div>`).join('')}
        </div>` : ''}

      <!-- Label filters -->
      <div class="labels-row">
        <div class="label-filter ${!st.filterLabel?'active':''}" data-label=""
             style="background:rgba(255,255,255,.08);color:var(--text2);border-color:${!st.filterLabel?'var(--accent)':'transparent'}">Vše</div>
        ${Object.entries(getAllLabelDefs()).filter(([key]) => !getHiddenLabelKeys().has(key)).map(([key, def]) => {
          const isCustom = key.startsWith('custom_');
          return `<div class="label-filter ${st.filterLabel===key?'active':''}" data-label="${key}"
               style="background:${def.color}22;color:${def.color};border-color:${st.filterLabel===key?def.color:'transparent'}">
            ${def.label}
            <span class="label-del-btn" data-del-label="${key}" title="Smazat štítek" style="margin-left:6px;opacity:.5;font-size:11px;cursor:pointer;line-height:1">✕</span>
          </div>`;
        }).join('')}
      </div>

      <!-- Content -->
      <div id="favs-content">
        ${filtered.length === 0 && favs.length === 0 ? this._emptyFavs() :
          filtered.length === 0 ? '<div class="empty-state"><div class="empty-state__icon">🔍</div><div class="empty-state__title">Žádné filmy v tomto filtru</div></div>' :
          st.calendarView ? this._buildCalendarView(filtered) :
          `<div class="movie-grid">
            ${filtered.map(m => `
              <div class="movie-card-wrap" data-id="${m.imdbId}">
                ${movieCard(m, { ctxBtn: { id: m.imdbId, data: JSON.stringify(m) }, watchedToggle: true })}
              </div>`).join('')}
          </div>`}
      </div>`;

    this._attachFavEvents(filtered, collections);
  },

  _emptyFavs() {
    return `<div class="empty-state">
      <div class="empty-state__icon">🎬</div>
      <div class="empty-state__title">Ještě žádné oblíbené</div>
      <div class="empty-state__sub">Klikni na 🔖 u libovolného filmu nebo prozkoumej sekci Bored 😴</div>
    </div>`;
  },

  _buildCalendarView(movies) {
    const grouped = {};
    for (const m of movies) {
      const key = m.year || 'Neznámý';
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(m);
    }
    const sorted = Object.entries(grouped).sort((a, b) => b[0].localeCompare(a[0]));
    return `<div class="calendar-view">` + sorted.map(([year, mms]) => `
      <div class="cal-year">${year}</div>
      <div class="cal-row">
        ${mms.map(m => `<div style="flex-shrink:0;width:100px">${movieCard(m, { watchedToggle: true })}</div>`).join('')}
      </div>`).join('') + '</div>';
  },

  _attachFavEvents(filtered, collections) {
    const st = this._favState;

    document.getElementById('fav-sort')?.addEventListener('change', e => { st.sortBy = e.target.value; this.renderFavorites(); });
    document.getElementById('btn-random-unseen')?.addEventListener('click', () => {
      const watchedIds = Storage.getWatchedIds();
      const unseen = filtered.filter(m => !watchedIds.has(m.imdbId));
      if (!unseen.length) { showToast('🎉 Všechny filmy jsi viděl!'); return; }
      openMovieDetail(unseen[Math.floor(Math.random() * unseen.length)]);
    });
    document.getElementById('btn-calendar')?.addEventListener('click', () => { st.calendarView = !st.calendarView; this.renderFavorites(); });
    document.getElementById('btn-stats')?.addEventListener('click', () => { st.showStats = !st.showStats; document.getElementById('stats-panel')?.classList.toggle('open', st.showStats); });
    document.getElementById('btn-share')?.addEventListener('click', async () => {
      const token = Storage.generateShareToken();
      const url = `${location.href.split('#')[0]}#share=${token}`;
      await navigator.clipboard?.writeText(url);
      showToast('🔗 Link zkopírován do schránky!');
    });
    document.getElementById('btn-new-col')?.addEventListener('click', async () => {
      const name = await promptDialog('Název nové kolekce:', 'např. Akce na víkend');
      if (name) { Storage.createCollection(name); this.renderFavorites(); }
    });
    // FIX #27: create custom label
    document.getElementById('btn-new-label')?.addEventListener('click', () => {
      const colors = ['#E53935','#FF6D00','#F9A825','#43A047','#00ACC1','#1E88E5','#5E35B1','#EC407A','#546E7A'];
      const emojis = ['🔴','🟠','🟡','🟢','🔵','🟣','🏷️','⭐','🎯','🎬','💡','🔥','❤️','👑','🎁','⚡','🌙','🎭'];
      const overlay = showModal(`
        <div style="padding:4px">
          <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:6px">Název štítku</label>
          <input class="input" id="_lbl-name" placeholder="např. Romantický večer" style="margin-bottom:14px">
          <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:6px">Ikona</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px" id="_lbl-emojis">
            ${emojis.map((em,i) => `<div data-emoji="${em}" style="width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:2px solid ${i===0?'var(--accent)':'transparent'};background:rgba(255,255,255,.06);transition:all .15s">${em}</div>`).join('')}
          </div>
          <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:6px">Barva</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px" id="_lbl-colors">
            ${colors.map((col,i) => `<div data-color="${col}" style="width:28px;height:28px;border-radius:50%;background:${col};cursor:pointer;border:3px solid ${i===0?'#fff':'transparent'};transition:border-color .15s"></div>`).join('')}
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button class="btn btn--ghost btn--sm" onclick="this.closest('.modal-overlay').remove()">Zrušit</button>
            <button class="btn btn--primary btn--sm" id="_lbl-save">Vytvořit</button>
          </div>
        </div>`, { title: '🏷️ Nový štítek' });
      let selectedColor = colors[0];
      let selectedEmoji = emojis[0];
      overlay.querySelectorAll('[data-color]').forEach(dot => {
        dot.addEventListener('click', () => {
          overlay.querySelectorAll('[data-color]').forEach(d => d.style.borderColor = 'transparent');
          dot.style.borderColor = '#fff'; selectedColor = dot.dataset.color;
        });
      });
      overlay.querySelectorAll('[data-emoji]').forEach(em => {
        em.addEventListener('click', () => {
          overlay.querySelectorAll('[data-emoji]').forEach(e => e.style.borderColor = 'transparent');
          em.style.borderColor = 'var(--accent)'; selectedEmoji = em.dataset.emoji;
        });
      });
      overlay.querySelector('#_lbl-save').addEventListener('click', () => {
        const name = overlay.querySelector('#_lbl-name').value.trim();
        if (!name) return;
        const key = 'custom_' + Date.now();
        saveCustomLabelDef(key, selectedColor, name, selectedEmoji);
        overlay.remove();
        this.renderFavorites();
      });
    });

    // Collections
    document.querySelector('.collections-row')?.addEventListener('click', e => {
      const chip = e.target.closest('[data-col]');
      const del = e.target.closest('[data-del]');
      if (del) { e.stopPropagation(); Storage.deleteCollection(del.dataset.del); st.filterCollection = null; this.renderFavorites(); return; }
      if (chip) { st.filterCollection = chip.dataset.col || null; this.renderFavorites(); }
    });

    // Label filter + delete
    document.querySelector('.labels-row')?.addEventListener('click', e => {
      const delBtn = e.target.closest('[data-del-label]');
      if (delBtn) {
        e.stopPropagation();
        const key = delBtn.dataset.delLabel;
        hideLabel(key); // works for both predefined and custom
        if (st.filterLabel === key) st.filterLabel = null;
        this.renderFavorites(); return;
      }
      const lf = e.target.closest('[data-label]');
      if (lf) { st.filterLabel = lf.dataset.label || null; this.renderFavorites(); }
    });

    // Card events
    const grid = document.getElementById('favs-content');
    attachCardEvents(grid, { onCardClick: m => { openMovieDetail(m).then(() => this.renderFavorites()); } });
    document.addEventListener('favorites-changed', () => {
      if (this.currentScreen === 'favorites') this.renderFavorites();
    }, { once: true });

    // Context menu — dispatched from ui.js via custom event
    document.addEventListener('card-ctx-menu', e => {
      if (!document.getElementById('favs-content')) return; // only active on fav screen
      this._showCtxMenu(e.detail.event, e.detail.movie, collections);
    }, { once: false });
    // Also handle direct clicks (fallback)
    grid?.addEventListener('click', e => {
      const btn = e.target.closest('[data-action="ctx-menu"]');
      if (!btn) return;
      e.stopPropagation();
      let movie; try { movie = JSON.parse(btn.dataset.movie || '{}'); } catch { return; }
      this._showCtxMenu(e, movie, collections);
    });
  },

  _showCtxMenu(e, movie, collections) {
    document.querySelector('.ctx-menu')?.remove();
    const menu = document.createElement('div');
    menu.className = 'ctx-menu';
    menu.innerHTML = `
      <div class="ctx-menu-item" data-act="similar">✨ Podobné filmy</div>
      <div class="ctx-menu-item" data-act="music">🎵 Soundtrack (YouTube)</div>
      ${collections.length ? `<div class="ctx-menu-item" data-act="collection">📁 Do kolekce</div>` : ''}
      <div class="ctx-menu-item" data-act="label">🏷️ Štítek</div>
      <div class="ctx-menu-item" data-act="remove" style="color:var(--red)">🗑️ Odebrat</div>`;
    menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
    menu.style.top  = Math.min(e.clientY, window.innerHeight - 200) + 'px';
    document.body.appendChild(menu);
    const close = () => menu.remove();
    setTimeout(() => document.addEventListener('click', close, { once: true }), 50);

    menu.addEventListener('click', async ev => {
      const act = ev.target.closest('[data-act]')?.dataset.act;
      if (!act) return;
      close();
      if (act === 'similar') {
        const overlay2 = showModal(`
          <div id="_csim-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:14px 12px;padding:16px"></div>
          <div id="_csim-sentinel" style="height:32px;display:flex;align-items:center;justify-content:center">
            <div class="spinner" style="width:24px;height:24px;border-width:2px"></div>
          </div>`, { title: `✨ Podobné: ${movie.title}`, wide: true });
        const body = overlay2.querySelector('.modal-body');
        let csimDone = false;
        const loadCSim = async () => {
          if (csimDone) return;
          csimDone = true;
          const similar = await API.getSmartSimilar(movie.id, movie.genreIds || []).catch(() => []);
          const grid = overlay2.querySelector('#_csim-grid');
          const sentinel = overlay2.querySelector('#_csim-sentinel');
          if (sentinel) sentinel.remove();
          if (!grid) return;
          if (!similar.length) {
            grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state__icon">🎬</div><div class="empty-state__title">Nic nenalezeno</div></div>`;
          } else {
            grid.innerHTML = similar.map(m => movieCard(m)).join('');
            attachCardEvents(grid);
          }
        };
        // Observe sentinel to load on first scroll-into-view (or immediately if visible)
        if (body) {
          const sentinel = overlay2.querySelector('#_csim-sentinel');
          const obs = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting) { obs.disconnect(); loadCSim(); }
          }, { root: body });
          if (sentinel) obs.observe(sentinel);
          else loadCSim();
        }
      }
      if (act === 'music') {
        const q = encodeURIComponent(`${movie.title} ${movie.year} official soundtrack`);
        window.open(`https://www.youtube.com/results?search_query=${q}`, '_blank');
      }
      if (act === 'collection') {
        const opts = collections.map(c => `<div class="ctx-menu-item" data-col="${c.id}">${escHtml(c.name)}</div>`).join('');
        const m2 = showModal(opts, { title: 'Přidat do kolekce' });
        m2.querySelector('.modal-body').addEventListener('click', ev2 => {
          const chip = ev2.target.closest('[data-col]');
          if (chip) { Storage.addToCollection(chip.dataset.col, movie.imdbId); m2.remove(); showToast('📁 Přidáno do kolekce'); }
        });
      }
      if (act === 'label') {
        // FIX #8: inline label picker — quick color dots, no modal
        const existingPicker = document.getElementById('label-quick-picker');
        if (existingPicker) existingPicker.remove();
        const allLabelDefs = getAllLabelDefs();
        const picker = document.createElement('div');
        picker.id = 'label-quick-picker';
        picker.style.cssText = `position:fixed;left:${Math.min(e.clientX, window.innerWidth-220)}px;top:${Math.min(e.clientY + 8, window.innerHeight-280)}px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px;z-index:600;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:200px;max-height:320px;overflow-y:auto`;
        const currentLabel = Storage.getLabels()[movie.imdbId];
        picker.innerHTML = `<div style="font-size:11px;color:var(--text2);margin-bottom:8px;font-weight:700">Přiřadit štítek</div>
          <div style="display:flex;flex-direction:column;gap:4px">
            ${Object.entries(allLabelDefs).map(([k,d]) => `
              <div data-lbl="${k}" style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:background .15s;background:${currentLabel===k?d.color+'22':'transparent'};border:1px solid ${currentLabel===k?d.color:'transparent'}">
                <span style="width:12px;height:12px;border-radius:50%;background:${d.color};flex-shrink:0;display:inline-block"></span>
                <span style="font-size:13px;font-weight:600;color:var(--text)">${d.label.replace(/^[^ ]+ /,'')}</span>
                ${currentLabel===k?'<span style="margin-left:auto;font-size:11px;color:'+d.color+'">✓</span>':''}
              </div>`).join('')}
            <div data-lbl="" style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:background .15s;color:var(--text3);font-size:13px">
              <span style="width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.15);flex-shrink:0;display:inline-block;display:flex;align-items:center;justify-content:center;font-size:9px">✕</span>
              <span>Odebrat štítek</span>
            </div>
          </div>`;
        document.body.appendChild(picker);
        // Hover highlight
        picker.querySelectorAll('[data-lbl]').forEach(row => {
          row.addEventListener('mouseenter', () => { row.style.background = 'var(--surface2)'; });
          row.addEventListener('mouseleave', () => {
            const k = row.dataset.lbl;
            const cl = Storage.getLabels()[movie.imdbId];
            const d = k ? getAllLabelDefs()[k] : null;
            row.style.background = (k && cl === k) ? (d.color + '22') : 'transparent';
          });
        });
        const closePicker = () => picker.remove();
        setTimeout(() => document.addEventListener('click', closePicker, { once: true }), 50);
        picker.addEventListener('click', ev2 => {
          const row = ev2.target.closest('[data-lbl]');
          if (row !== null) { ev2.stopPropagation(); Storage.setLabel(movie.imdbId, row.dataset.lbl); picker.remove(); this.renderFavorites(); }
        });
      }
      if (act === 'remove') {
        Storage.removeFavorite(movie.imdbId);
        document.dispatchEvent(new CustomEvent('favorites-changed'));
        showToast(`❌ ${movie.title} odebrán`);
        this.renderFavorites();
      }
    });
  },

  // ════════════════════════════════════════════════
  //  BORED
  // ════════════════════════════════════════════════
  _boredOpts: { genreId: null, decade: null, spotlightMode: false, showHeatmap: false },

  renderBored() {
    const s = document.getElementById('screen');
    // Override full screen
    s.style.overflow = 'hidden';
    s.style.height = '100%';
    const decades = ['1970','1980','1990','2000','2010','2020'];
    s.innerHTML = `
      <div class="bored-screen">
        <div class="bored-topbar">
          <button class="btn btn--icon" id="bored-back">←</button>
          <div class="bored-topbar__title">We<span>♥</span>Movies</div>
          <button class="btn btn--icon" id="bored-shuffle" title="Nová sada">🔀</button>
        </div>
        <div class="bored-filters">
          <div class="bored-filter active" data-filter="">✨ Vše</div>
          <div class="bored-filter" data-roulette="">🎡 Ruleta</div>
          ${decades.map(d => `<div class="bored-filter" data-decade="${d}">${d}s</div>`).join('')}
          ${this.genreCache.slice(0,10).map(g =>
            `<div class="bored-filter" data-genre="${g.id}">${GENRE_EMOJIS[g.id]||'🎬'} ${g.name}</div>`
          ).join('')}
        </div>
        <div class="bored-canvas-wrap">
          <div id="bored-loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text2)">
            <div class="spinner"></div>
            <div>Načítám filmy ze světa...</div>
          </div>
          <canvas id="bored-canvas" style="display:none"></canvas>
        </div>
      </div>`;

    document.getElementById('bored-back').addEventListener('click', () => {
      s.style.overflow = '';
      s.style.height = '';
      this.navigate('home');
    });

    const opts = this._boredOpts;

    document.getElementById('bored-shuffle').addEventListener('click', () => this._loadBoredMovies());

    // Filters
    document.querySelector('.bored-filters').addEventListener('click', async e => {
      const f = e.target.closest('[data-filter],[data-decade],[data-genre],[data-roulette]');
      if (!f) return;
      document.querySelectorAll('.bored-filter').forEach(x => x.classList.remove('active'));
      f.classList.add('active');

      if ('roulette' in f.dataset) {
        this._showGenreRoulette();
        return;
      }
      opts.genreId = f.dataset.genre ? parseInt(f.dataset.genre) : null;
      opts.decade  = f.dataset.decade || null;
      this._loadBoredMovies();
    });

    this._loadBoredMovies();
  },

  _boredMovies: [],

  async _loadBoredMovies() {
    const opts = this._boredOpts;
    document.getElementById('bored-loading').style.display = 'flex';
    document.getElementById('bored-canvas').style.display = 'none';
    if (this._boredGrid) { this._boredGrid.destroy(); this._boredGrid = null; }
    try {
      const movies = await API.getBoredMovies({ genreId: opts.genreId, decade: opts.decade });
      this._boredMovies = movies;
      const canvas = document.getElementById('bored-canvas');
      document.getElementById('bored-loading').style.display = 'none';
      canvas.style.display = 'block';
      this._boredGrid = new BoredGrid(canvas, movies, {
        spotlightMode: opts.spotlightMode,
        showHeatmap: opts.showHeatmap,
        onSelect: (movie) => openMovieDetail(movie),
      });
    } catch(e) {
      document.getElementById('bored-loading').innerHTML = '<div style="text-align:center"><div style="font-size:48px">⚠️</div><div>Chyba při načítání</div></div>';
    }
  },

  _showGenreRoulette() {
    if (!this.genreCache.length) return;
    let current = this.genreCache[Math.floor(Math.random() * this.genreCache.length)];
    let spinning = false;
    const overlay = showModal(`
      <div style="text-align:center;padding:16px">
        <div id="roulette-emoji" style="font-size:72px;transition:transform .1s">${GENRE_EMOJIS[current.id]||'🎬'}</div>
        <div id="roulette-name" style="font-size:22px;font-weight:800;margin:12px 0">${current.name}</div>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:16px">
          <button class="btn btn--ghost" id="roulette-spin">🎲 Točit!</button>
          <button class="btn btn--primary" id="roulette-pick">Vybrat tento</button>
        </div>
      </div>`, { title: '🎡 Ruleta žánrů' });

    document.getElementById('roulette-spin').addEventListener('click', () => {
      if (spinning) return;
      spinning = true;
      let count = 0, max = 15 + Math.floor(Math.random() * 10);
      const interval = setInterval(() => {
        current = this.genreCache[Math.floor(Math.random() * this.genreCache.length)];
        document.getElementById('roulette-emoji').textContent = GENRE_EMOJIS[current.id]||'🎬';
        document.getElementById('roulette-name').textContent = current.name;
        count++;
        if (count >= max) { clearInterval(interval); spinning = false; }
      }, 80 + count * 8);
    });
    document.getElementById('roulette-pick').addEventListener('click', () => {
      overlay.remove();
      this._boredOpts.genreId = current.id;
      this._boredOpts.decade = null;
      this._loadBoredMovies();
    });
  },

  // ════════════════════════════════════════════════
  //  HOT OR NOT landing
  // ════════════════════════════════════════════════
  async renderHotOrNotLanding() {
    const s = document.getElementById('screen');
    s.innerHTML = `
      <div style="padding:24px;max-width:480px;margin:0 auto">
        <h2 style="font-size:22px;font-weight:900;margin-bottom:8px">🔥 Hot or Not</h2>
        <p style="color:var(--text2);margin-bottom:24px">Procházej filmy rychle — ukládej nebo přeskakuj. Na konci uvidíš co jsi vybral.</p>
        <button class="btn btn--primary" id="hon-popular" style="padding:16px;font-size:15px;border-radius:14px;width:100%">🌍 Spustit</button>
        <p style="color:var(--text3);font-size:12px;margin-top:20px;text-align:center">Tip: Klikni na film pro detail, nebo použij tlačítka</p>
      </div>`;
    document.getElementById('hon-popular').addEventListener('click', async () => {
      s.innerHTML = spinner('Připravuji náhodné filmy...');
      // FIX #12: fetch truly random movies from random pages
      try {
        const pages = Array.from({length: 5}, (_, i) => Math.floor(Math.random() * 100) + 1);
        const results = await Promise.all(pages.map(p =>
          fetch(`https://api.themoviedb.org/3/discover/movie?language=cs-CZ&sort_by=vote_count.desc&vote_average.gte=5&page=${p}`,
            { headers: { 'Authorization': 'Bearer ' + API.getToken() } }).then(r => r.json())
        ));
        let movies = results.flatMap(d => (d.results || []).filter(m => m.poster_path).map(m => ({
          id: m.id, title: m.title || m.name || '?',
          year: (m.release_date || '').substring(0,4), imdbId: String(m.id),
          posterUrl: `https://image.tmdb.org/t/p/w342${m.poster_path}`,
          backdropUrl: m.backdrop_path ? `https://image.tmdb.org/t/p/w780${m.backdrop_path}` : '',
          rating: (m.vote_count || 0) >= 10 ? (m.vote_average || 0) : 0,
          overview: m.overview || '', genreIds: m.genre_ids || [],
          releaseDate: m.release_date || '', mediaType: 'movie',
        })));
        // Shuffle
        movies = movies.sort(() => Math.random() - 0.5);
        this.renderHotOrNot(movies);
      } catch { showToast('Chyba při načítání filmů'); }
    });

  },

  // ════════════════════════════════════════════════
  //  HOT OR NOT
  // ════════════════════════════════════════════════
  renderHotOrNot(movies) {
    const s = document.getElementById('screen');
    s.style.overflow = 'hidden';
    s.style.height = '100%';
    let current = 0;
    const saved = [], skipped = [];
    let animating = false;

    const render = () => {
      const isDone = current >= movies.length;
      s.innerHTML = `
        <div class="hon-screen">
          <div class="hon-progress"><div class="hon-progress__fill" style="width:${current/movies.length*100}%"></div></div>
          ${isDone ? `
            <div class="hon-done">
              <div class="hon-done__emoji">🎉</div>
              <div class="hon-done__title">Hotovo!</div>
              <div style="color:var(--accent);font-size:16px;font-weight:700">Uloženo: ${saved.length} filmů</div>
              <div style="color:var(--text2)">Přeskočeno: ${skipped.length}</div>
              ${saved.length ? `<div class="hon-done__picks">
                ${saved.map(m => m.posterUrl ? `<img src="${m.posterUrl}" alt="${escHtml(m.title)}">` : '').join('')}
              </div>` : ''}
              <button class="btn btn--primary" id="hon-back">← Zpět do Bored</button>
            </div>` : `
            <div style="padding:8px 16px;text-align:right;color:var(--text3);font-size:13px;flex-shrink:0">${current+1} / ${movies.length}</div>
            <div class="hon-card-area">
              <div class="hon-card" id="hon-card">
                ${movies[current].posterUrl ? `<img class="hon-card__img" src="${movies[current].posterUrl}" alt="">` : '<div style="width:100%;height:100%;background:var(--surface2)"></div>'}
                <div class="hon-card__overlay"></div>
                <div class="hon-card__info">
                  <div class="hon-card__title">${escHtml(movies[current].title)}</div>
                  <div class="hon-card__sub">${movies[current].year}${movies[current].rating>0?' · ★ '+movies[current].rating.toFixed(1):''}</div>
                  ${movies[current].overview ? `<div class="hon-card__overview">${escHtml(movies[current].overview)}</div>` : ''}
                </div>
                <div class="hon-verdict" id="hon-verdict"></div>
              </div>
            </div>
            <div class="hon-btns">
              <div class="hon-btn hon-btn--skip" id="hon-skip">
                <div class="hon-btn__circle">👎</div>
                <div class="hon-btn__label">Přeskočit</div>
              </div>
              <div class="hon-btn hon-btn--detail" id="hon-detail">
                <div class="hon-btn__circle">ℹ️</div>
                <div class="hon-btn__label">Detail</div>
              </div>
              <div class="hon-btn hon-btn--save" id="hon-save">
                <div class="hon-btn__circle">🔥</div>
                <div class="hon-btn__label">Uložit</div>
              </div>
            </div>`}
        </div>`;

      if (isDone) {
        document.getElementById('hon-back').addEventListener('click', () => {
          s.style.overflow = ''; s.style.height = '';
          this.navigate('hotnot');
        });
        return;
      }

      const decide = async (hot) => {
        if (animating) return;
        animating = true;
        const card = document.getElementById('hon-card');
        const verdict = document.getElementById('hon-verdict');
        verdict.textContent = hot ? '🔥' : '👎';
        verdict.className = `hon-verdict ${hot ? 'hot' : 'skip'} visible`;
        card.className = `hon-card ${hot ? 'slide-right' : 'slide-left'}`;
        if (hot) { Storage.saveFavorite(movies[current]); saved.push(movies[current]); document.dispatchEvent(new CustomEvent('favorites-changed')); }
        else skipped.push(movies[current]);
        await new Promise(r => setTimeout(r, 350));
        current++;
        animating = false;
        render();
      };

      document.getElementById('hon-skip').addEventListener('click', () => decide(false));
      document.getElementById('hon-save').addEventListener('click', () => decide(true));
      document.getElementById('hon-detail').addEventListener('click', () => openMovieDetail(movies[current]));
      document.getElementById('hon-card').addEventListener('click', () => openMovieDetail(movies[current]));
    };
    render();
  },

  // ════════════════════════════════════════════════
  //  KINO VEČER
  // ════════════════════════════════════════════════
  async renderKinoVecer(fromSaved = false) {
    const s = document.getElementById('screen');
    s.innerHTML = `
      <div class="kv-screen">
        <button class="btn btn--ghost btn--sm" id="kv-back">← Zpět</button>
        <h2 style="margin:16px 0 8px;font-size:20px;font-weight:800">🎬 Kino večer</h2>
        <div class="kv-intro">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="font-size:28px">🍿</div>
            <div>
              <div style="color:var(--text2);font-size:12px">Připravili jsme pro tebe</div>
              <div style="font-weight:800;font-size:15px">dokonalý filmový večer</div>
            </div>
          </div>
          <div id="kv-theme-badge"></div>
          <div id="kv-anchor"></div>
        </div>
        <div class="kv-source-btns">
          <button class="kv-source-btn ${!fromSaved?'active':''}" id="kv-from-recommended">🌍 Z doporučených</button>
          <button class="kv-source-btn ${fromSaved?'active':''}" id="kv-from-saved">❤️ Z mých oblíbených</button>
        </div>
        <div id="kv-movies">${spinner('Skládám dokonalý večer...')}</div>
        <div class="kv-actions">
          <button class="btn btn--ghost" id="kv-refresh">🔀 Jiný program</button>
          <button class="btn btn--primary" id="kv-save-all">🔖 Uložit vše</button>
        </div>
      </div>`;

    document.getElementById('kv-back').addEventListener('click', () => this.renderBored());
    document.getElementById('kv-from-recommended').addEventListener('click', () => this.renderKinoVecer(false));
    document.getElementById('kv-from-saved').addEventListener('click', () => this.renderKinoVecer(true));

    let currentPicks = [];

    const load = async () => {
      document.getElementById('kv-movies').innerHTML = spinner('Skládám dokonalý večer...');
      try {
        let source;
        if (fromSaved) {
          source = Storage.getFavorites();
          if (source.length < 3) { document.getElementById('kv-movies').innerHTML = '<div class="empty-state"><div class="empty-state__icon">😅</div><div class="empty-state__title">Potřebuješ alespoň 3 uložené filmy</div></div>'; return; }
        } else {
          source = await API.getPopular();
        }
        const result = await API.getKinoVecer(source);
        if (!result) { document.getElementById('kv-movies').innerHTML = '<div class="empty-state"><div class="empty-state__icon">😕</div><div class="empty-state__title">Nepodařilo se sestavit program</div></div>'; return; }
        currentPicks = result.movies;

        const badge = document.getElementById('kv-theme-badge');
        if (badge) badge.innerHTML = `<div class="kv-theme">${escHtml(result.theme)}</div>`;
        const anchor = document.getElementById('kv-anchor');
        if (anchor) anchor.innerHTML = `<div class="kv-anchor">Inspirováno filmem: ${escHtml(result.anchor)}</div>`;

        const times = ['~19:00','~21:15','~23:30'];
        const slots = ['Film 1','Film 2','Film 3'];
        document.getElementById('kv-movies').innerHTML = result.movies.map((m, i) => `
          <div class="kv-movie-card" data-movie='${JSON.stringify(m).replace(/'/g,"&#39;")}'>
            <div>
              <div class="kv-num">${i+1}</div>
              <div class="kv-time">${times[i]}</div>
            </div>
            ${m.posterUrl ? `<img class="kv-poster" src="${m.posterUrl}" alt="">` : ''}
            <div class="kv-info">
              <div class="kv-slot">${slots[i]}</div>
              <div class="kv-title">${escHtml(m.title)}</div>
              <div class="kv-sub">${m.year}${m.rating>0?` · ★ ${m.rating.toFixed(1)}`:''}</div>
            </div>
            <div style="color:var(--text3)">›</div>
          </div>`).join('');

        document.querySelectorAll('.kv-movie-card').forEach(card => {
          card.addEventListener('click', () => {
            let m; try { m = JSON.parse(card.dataset.movie); } catch { return; }
            openMovieDetail(m);
          });
        });
      } catch(e) {
        document.getElementById('kv-movies').innerHTML = '<div class="empty-state"><div class="empty-state__icon">⚠️</div><div class="empty-state__title">Chyba při načítání</div></div>';
      }
    };

    document.getElementById('kv-refresh').addEventListener('click', load);
    document.getElementById('kv-save-all').addEventListener('click', () => {
      currentPicks.forEach(m => Storage.saveFavorite(m));
      document.dispatchEvent(new CustomEvent('favorites-changed'));
      showToast(`🎬 ${currentPicks.length} filmy uloženy!`);
    });

    await load();
  },
};

// Start
App.init();
</script>
</body>
</html>
